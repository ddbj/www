    <article class="md-content">
      <p>公開された塩基配列データは DDBJ, EMBL-Bank, GenBank で共有されますので、登録は何れかへ１度のみで 必要十分です。 <br />既に DDBJ に登録した配列を GenBank に登録した場合、重複登録になりますので 登録しないでください。</p>
<p>雑誌によっては「GenBank へ塩基配列を登録するように」と案内されている場合もありますが、<a href="/documents/accessions.html">DDBJ が発行したアクセッション番号</a>は GenBank を含む <a href="/insdc.html">国際塩基配列データベース</a>に共通です。 </p>
