        <p>7月27日、山梨県北杜市立甲陵高等学校の1年生が、見学のため遺伝研を訪れました。<br />生命ネットワーク研究室の有田教授の講義を受けた後、初期発生部門の浅川助教のもとでゼブラフィッシュの見学をしていただきました。また、遺伝研スーパーコンピュータの見学も行いました。</p>
